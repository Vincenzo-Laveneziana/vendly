[supervisord]
nodaemon=true
user=root

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10
startsecs=2

[program:httpd]
command=/bin/bash -c "rm -f /var/run/httpd/httpd.pid && exec /usr/sbin/httpd -D FOREGROUND"
autostart=true
autorestart=true
priority=20
startsecs=3
startretries=10

[program:reverb]
command=php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8081
autostart=true
autorestart=true
priority=30
stderr_logfile=/var/log/reverb.err.log
stdout_logfile=/var/log/reverb.out.log